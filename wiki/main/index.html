
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДмитМед МедЭнциклопедия</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f3f8fb;
    color:#222;
}

header{
    background:#0077cc;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    font-size:36px;
}

header p{
    margin-top:8px;
    opacity:0.9;
}

.search{
    margin:35px auto;
    max-width:700px;
    text-align:center;
}

.search form{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.search input{
    flex:1;
    min-width:250px;
    padding:15px;
    font-size:18px;
    border:2px solid #0077cc;
    border-radius:30px;
}

.search button{
    padding:15px 28px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#0077cc;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

.search button:hover{
    background:#005fa3;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 12px rgba(0,0,0,.08);
    padding:20px;
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h2{
    color:#0077cc;
    margin-bottom:10px;
}

.tag{
    display:inline-block;
    background:#d9f2ff;
    color:#005a99;
    padding:5px 10px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:12px;
}

footer{
    text-align:center;
    margin-top:50px;
    padding:25px;
    background:#005a99;
    color:white;
}
</style>

</head>
<body>

<header>
<h1>ДмитМед МедЭнциклопедия</h1>
<p>Ищите медицинские термины, заболевания, лечения, и т.д.</p>
</header>

<div class="search">
    <form action="https://dmtmed.github.io/wiki/search/" method="GET">
        <input
            type="text"
            name="q"
            placeholder="Search..."
            required>
        <button type="submit">Искать</button>
    </form>
</div>

<div class="container">

<div class="grid">

<div class="card">
  <h2>Попурлярные статьи</h2>
  <a href="https://dmtmed.github.io/wiki/R-125">Солё</a>
</div>

</div>

<footer>
<p><strong>Medical Encyclopedia</strong></p>
<p>This website is for educational purposes and is not a substitute for professional medical advice.</p>
</footer>

</body>
</html>
```
